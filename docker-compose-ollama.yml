version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    environment:
      NVIDIA_VISIBLE_DEVICES: "all"
      NVIDIA_DRIVER_CAPABILITIES: "compute,utility"
    runtime: nvidia 

  kg-backend:
    environment:
      LLM_WORKER_URL: "http://llm-worker:7000"
    depends_on:
      - ollama

  mcp-server:
    environment:
      QDRANT_URL: "qdrant"
      QDRANT_PORT: "6333"
    depends_on:
      - ollama
      - qdrant
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  llm-worker:
    environment:
      PYTHONPATH: "src"
    depends_on:
      mcp-server:
        condition: service_healthy
      ollama:
        condition: service_started
      qdrant:
        condition: service_healthy


  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant_kg
volumes:
  ollama_data:
