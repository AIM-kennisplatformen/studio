# -----------------------------
# Build system
# -----------------------------
[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[tool.hatch.build.targets.wheel]
packages = ["src/studio"]

# -----------------------------
# Dependency groups (PEP 735)
# -----------------------------
[dependency-groups]
dev = ["nest_asyncio"]

# -----------------------------
# Project metadata + PyPI runtime deps
# -----------------------------
[project]
name = "MCP-demo"
description = "MCP demo library"
readme = "README.md"
license = { text = "NONE" }
authors = [
  { name = "RaoulG", email = "Raoul.Grouls@han.nl" },
  { name = "Hoog-V", email = "victor.hogeweij@han.nl" },
]
classifiers = [
  "Environment :: Console",
  "Framework :: FastAPI",
  "Programming Language :: Python :: 3.12",
]
requires-python = ">=3.12"
version = "0.1.0"

dependencies = [
    "fastmcp==2.10.3",
    "httpx",
    "typedb-driver==2.29.2",
    "langfuse"
]

# -----------------------------
# Testing
# -----------------------------
[tool.pytest.ini_options]
pythonpath = ["client", "server"]
addopts = ["--import-mode=importlib"]

# -----------------------------
# Mypy
# -----------------------------
[tool.mypy]
allow_redefinition = true
disable_error_code = [
    "call-arg",        # unexpected keyword arguments
    "import-untyped",  # missing stubs like requests
    "import-not-found",
    "call-overload",
    "arg-type",
    "misc",
]
pretty = true
exclude = [
    "^\\.pixi/",  # ignore the .pixi folder at repo root
]

# -----------------------------
# Ruff
# -----------------------------
[tool.ruff.lint]
select = ["E4", "E7", "E9", "F", "C4", "PT"]

[tool.ruff]
exclude = [".pixi", "tests"]

# -----------------------------
# Pixi (Conda) — merged here for clarity
# -----------------------------
[tool.pixi.workspace]
channels = [
  "https://fast.prefix.dev/conda-forge",
  "https://repo.prefix.dev/pypdfium2-public",
  "https://repo.prefix.dev/pytorch",
]
platforms = ["linux-64", "osx-64", "osx-arm64"]

# Host deps (for builds like docling from PyPI)
[tool.pixi.host-dependencies]
compilers = ">=1.9.0"
pkg-config = ">=0.29.2"

# Conda-side runtime dependencies
[tool.pixi.dependencies]
python = "3.12.*"
# Dotenv is for reading .env files
python-dotenv = ">=1.1.0"

[tool.pixi.tasks]
mcp_server="PYTHONPATH=src python -m studio.main"
vscode = "code ."

# Activation env
[tool.pixi.activation.env]
PYTHONNOUSERSITE = "1"
LD_LIBRARY_PATH = "$CONDA_PREFIX/lib:$LD_LIBRARY_PATH"

# Platform-specific deps
[tool.pixi.target.linux-64.dependencies]
python-devtools = ">=0.12.2"         # Optional but useful
# cuda-toolkit = "12.9.0.*"   # For use with CUDA
