version: "3.9"

services:
  ####################################################
  # PostgreSQL for Authentik
  ####################################################
  postgresql:
    image: postgres:16-alpine
    container_name: authentik-postgres
    env_file: .env
    environment:
      POSTGRES_DB: ${PG_DB:-authentik}
      POSTGRES_USER: ${PG_USER:-authentik}
      POSTGRES_PASSWORD: ${PG_PASS}
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - internal

  ####################################################
  # Authentik Server (UI: http://auth.localhost)
  ####################################################
  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10.2}
    container_name: authentik-server
    command: server
    depends_on:
      - postgresql
    env_file: .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}

      # Required for correct redirects
      AUTHENTIK_HOST: http://auth.localhost
      AUTHENTIK_HOST_BROWSER: http://auth.localhost
      AUTHENTIK_COOKIE_DOMAIN: localhost
    networks:
      - internal

  ####################################################
  # Authentik Worker
  ####################################################
  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10.2}
    container_name: authentik-worker
    command: worker
    depends_on:
      - postgresql
    env_file: .env
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: ${PG_DB:-authentik}
      AUTHENTIK_POSTGRESQL__USER: ${PG_USER:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal

  ####################################################
  # Authentik Outpost Proxy (REQUIRED for ForwardAuth)
  ####################################################
  authentik-proxy:
    image: ghcr.io/goauthentik/proxy
    container_name: authentik-outpost-proxy
    environment:
      AUTHENTIK_HOST: http://authentik-server:9000
      AUTHENTIK_HOST_BROWSER: http://auth.localhost
      AUTHENTIK_INSECURE: "true"
      AUTHENTIK_TOKEN: EEFkmQan9hQDTfyL0yBH0s7pA4vVV76Qa7plWoepeFE0gEaWO4M6Ld628u1J
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - internal
    ports:
      # expose outpost so caddy can hit it
      - "9300:9000"

  ####################################################
  # FastAPI Backend
  ####################################################
  kg-backend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: kg-backend
    networks:
      - internal
    environment:
      PORT: 9000

  ####################################################
  # Caddy (reverse proxy + forward_auth)
  ####################################################
  nginx:
    image: nginx:latest
    container_name: kg-nginx
    depends_on:
      - kg-backend
      - authentik-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - internal


networks:
  internal:

volumes:
  database:
