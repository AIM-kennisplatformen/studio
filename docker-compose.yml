version: "3.9"

services:
  kg-backend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.backend
    container_name: kg-backend
    env_file: [.env]
    environment:
      PYTHONPATH: "src"
      BACKEND_BASE_URL:    "${BACKEND_BASE_URL}"
      # NOTE: Uses Docker service name for inter-container communication
      LLM_WORKER_URL:      "http://llm-worker"
      LLM_WORKER_PORT:     "7000"
      OAUTH_CLIENT_ID:     "${OAUTH_CLIENT_ID}"
      OAUTH_CLIENT_SECRET: "${OAUTH_CLIENT_SECRET}"
      # Uses external IP so browser redirects work; extra_hosts maps it to Authentik inside Docker
      OAUTH_DISCOVERY_URL: "${OAUTH_DISCOVERY_URL}"
    ports:
      - "10090:10090"
    extra_hosts:
      # NOTE: Maps the VM external IP to the Docker host so the backend can reach Authentik
      # Change to "host-gateway" or remove if running on your own PC (localhost)
      - "145.38.190.150:host-gateway"
    volumes:
      - .:/app
    networks:
      - studio-net
    command:
      - pixi
      - run
      - python
      - -m
      - uvicorn
      - src.backend.main:app
      - --host
      - 0.0.0.0
      - --port
      - "10090"

  mcp-server:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.mcp
    container_name: mcp-server
    env_file: [.env]
    environment:
      PYTHONPATH: "src"
      ZOTERO_API_KEY: "${ZOTERO_API_KEY}"
      ZOTERO_LIBRARY_ID: "${ZOTERO_LIBRARY_ID}"
      ZOTERO_COLLECTION_ID: "${ZOTERO_COLLECTION_ID}"
      # NOTE: Uses Docker service name for inter-container communication
      QDRANT_URL: "qdrant"
      QDRANT_PORT: "${QDRANT_PORT}"
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    networks:
      - studio-net
    command:
      - pixi
      - run
      - python
      - src/mcp_servers/main.py

  llm-worker:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile.llm_worker
    container_name: llm-worker
    restart: on-failure
    depends_on:
      - mcp-server
    env_file: [.env]
    environment:
      PYTHONPATH: "src"
      LANGFUSE_PUBLIC_KEY: "${LANGFUSE_PUBLIC_KEY}"
      LANGFUSE_SECRET_KEY: "${LANGFUSE_SECRET_KEY}"
      LANGFUSE_HOST:       "${LANGFUSE_HOST}"
      LLM_WORKER_URL:      "${LLM_WORKER_URL}"
      LLM_WORKER_PORT:     "7000"
      MCP_TOOL_CONFIG_PATH: "/app/scepa_tools_docker.json"
      OPENAI_HOST:         "${OPENAI_HOST}"
      OPENAI_API_KEY:      "${OPENAI_API_KEY}"
      LLM_MODEL:           "${LLM_MODEL}"
    ports:
      - "7000:7000"
    volumes:
      - .:/app
      - ./llm_worker_config.toml:/app/llm_worker_config.toml
    networks:
      - studio-net
    command:
      - pixi
      - run
      - python
      - src/llm_worker/main.py
  qdrant:
    image: qdrant/qdrant:v1.13.5-unprivileged
    container_name: qdrant_kg
    restart: unless-stopped
    user: "1000:1000"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_paper_data:/qdrant/storage:Z
    networks:
      - studio-net

networks:
  studio-net:
    name: studio-net

volumes:
  qdrant_paper_data: