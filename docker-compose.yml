services:
  backend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: studio_backend
    image: studio_backend
    command: >
      sh -c "
      pixi run frontend_build &&
      pixi run backend_no_docker
      "
    ports:
      - "10090:10090"
    environment:
      - MCP_USE_OAUTH
      - BACKEND_BASE_URL
      - OAUTH_DISCOVERY_URL
      - OAUTH_CLIENT_ID
      - OAUTH_CLIENT_SECRET
      - LANGFUSE_SECRET_KEY
      - LANGFUSE_PUBLIC_KEY
      - LANGFUSE_HOST
      - OPENAI_HOST
      - OPENAI_API_KEY
      - LLM_MODEL
      - MCP_TOOL_CONFIG_PATH
      - REDIS_URL
      - POSTGRES_URL
    volumes:
      - .:/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - mcp_server_scepa_studio_net
    depends_on:
      - redis
  redis:
    image: redis:8-alpine
    container_name: studio_redis
    ports:
      - "6379:6379"
    networks:
      - mcp_server_scepa_studio_net

networks:
  mcp_server_scepa_studio_net:
    driver: bridge
    # external: true  # Reference the external network from MCP stack
