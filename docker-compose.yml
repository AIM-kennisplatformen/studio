version: "3.9"

services:
  backend:
    build: dockerfiles/Dockerfile
    container_name: mcp_backend
    command: >
      sh -c "
      pixi run frontend_build &&
      pixi run backend_no_docker
      "
    ports:
      - "10090:10090"
    env_file:
      - .env
    environment:
      - LLM_WORKER_URL=http://llm_worker
    depends_on:
      - llm_worker
      - mcp_server
    volumes:
      - .:/app

  mcp_server:
    build: dockerfiles/Dockerfile
    container_name: mcp_server
    command: pixi run mcp_server
    ports:
      - "8000:8000"   # EXPOSE TO HOST
    env_file:
      - .env
    environment:
      - MCP_TOOL_CONFIG_PATH=/app/scepa_tools.json
    volumes:
      - .:/app

  llm_worker:
    build: dockerfiles/Dockerfile
    container_name: llm_worker
    command: pixi run llm_worker
    ports:
      - "9200:9200"
    env_file:
      - .env
    environment:
      - LLM_WORKER_PORT=9200
    volumes:
      - .:/app