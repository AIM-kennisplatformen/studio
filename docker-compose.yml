services:
  ####################################################
  # PostgreSQL
  ####################################################
  postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: authentik
      POSTGRES_USER: authentik
      POSTGRES_PASSWORD: ${PG_PASS}
    volumes:
      - database:/var/lib/postgresql/data
    networks:
      - internal

  ####################################################
  # Authentik Server
  ####################################################
  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10.2}
    command: server
    depends_on:
      - postgresql
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_HOST: http://auth.localhost:9000
      AUTHENTIK_HOST_BROWSER: http://auth.localhost:9000
    networks:
      - internal
    ports:
      - "9000:9000"  # exposed only for local dev via DNS

  ####################################################
  # Authentik Worker
  ####################################################
  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.10.2}
    command: worker
    depends_on:
      - postgresql
    environment:
      AUTHENTIK_POSTGRESQL__HOST: postgresql
      AUTHENTIK_POSTGRESQL__NAME: authentik
      AUTHENTIK_POSTGRESQL__USER: authentik
      AUTHENTIK_POSTGRESQL__PASSWORD: ${PG_PASS}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    networks:
      - internal

  ####################################################
  # FastAPI Backend
  ####################################################
  kg-backend:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    environment:
      OAUTH_CLIENT_ID: rkuclih8uzm44nTUvwasexioUKFk5aG1zhG8jcJX
      OAUTH_CLIENT_SECRET: NEb0sAcMc2kTTdvfJMctLYE35Fp0GqyqFp4oOVrstxsevnVMJutiIhvb6TzwPrkbphAh1EiI74oRRO79xRCoZTh1suFYTV9J0tmRJBIFIF4znDYwNyDp3IzUQlESvaS0
      OAUTH_DISCOVERY_URL: http://auth.localhost:9000/application/o/kg/.well-known/openid-configuration
      BASE_URL: http://kg.localhost:8090
    networks:
      - internal
    extra_hosts:
    - "auth.localhost:172.19.0.5"   # IP of authentik-server container

  ####################################################
  # NGINX Reverse Proxy
  ####################################################
  nginx:
    image: nginx:alpine
    ports:
      - "8090:80"
    depends_on:
      - authentik-server
      - kg-backend
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal

networks:
  internal:

volumes:
  database:
