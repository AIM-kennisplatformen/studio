version: "3.4"

services:
  api:
    entrypoint: >
      sh -c "
        echo 'Installing pixi...' &&
        curl -fsSL https://pixi.sh/install.sh | bash -s -- --yes &&
        mv ~/.pixi/bin/pixi /usr/local/bin/pixi &&
        echo 'Pixi installed. Starting LibreChat...' &&
        exec node api/server/index.js
      "
